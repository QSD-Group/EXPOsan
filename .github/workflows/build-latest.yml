# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: build-latest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/workflows/build-latest.yml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/BioSTEAMDevelopmentGroup/thermosteam.git@master
        pip install git+https://github.com/BioSTEAMDevelopmentGroup/biosteam.git@master
        pip install -e ".[ci,integration]"
    - name: Test doc examples
      run: |
        pytest exposan --doctest-modules
    - name: Test systems
      run: |
        mkdir -p tmps
        pytest tests -n 2 --dist loadfile --basetemp=tmps/pytest-${{ github.run_id }}-${{ github.run_attempt }}
