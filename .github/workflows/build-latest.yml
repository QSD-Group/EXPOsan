# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: build-latest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-doc-examples:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-latest.yml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -c .github/requirements-release.txt -e ".[ci]"
        pip install git+https://github.com/QSD-Group/QSDsan.git
    - name: Test doc examples
      run: |
        pytest exposan --doctest-modules

  test-bsm2:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-latest.yml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -c .github/requirements-release.txt -e ".[ci]"
        pip install git+https://github.com/QSD-Group/QSDsan.git
    - name: Test BSM2
      run: |
        pytest tests/test_bsm2.py

  test-systems:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-latest.yml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -c .github/requirements-release.txt -e ".[ci]"
        pip install git+https://github.com/QSD-Group/QSDsan.git
    - name: Test systems
      run: |
        mkdir -p tmps
        pytest tests --ignore=tests/test_bsm2.py -n 2 --dist loadfile --basetemp=tmps/pytest-${{ github.run_id }}-${{ github.run_attempt }}

  build:
    needs: [test-doc-examples, test-bsm2, test-systems]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - name: Confirm test suite passed
      run: |
        echo "Doc examples, BSM2, and system tests passed."

  thin-install-smoke:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/workflows/build-latest.yml
    - name: Install with no extras (thin install)
      run: |
        python -m pip install --upgrade pip
        pip install .
    - name: Confirm core import works without complete extras
      run: |
        python -c "import exposan; print(exposan.__version__)"
    - name: Confirm a complete-gated feature raises a friendly error
      run: |
        python -c "
        try:
            import exposan.hap
        except ModuleNotFoundError as e:
            msg = str(e)
            assert 'pip install exposan[complete]' in msg, msg
            print('OK: friendly error raised as expected')
        else:
            raise SystemExit('exposan.hap imported without ortools/tsp_solver installed — thin install leaked a complete dependency')
        "

  retry-with-upstream-master:
    needs: [test-doc-examples, test-bsm2, test-systems]
    if: ${{ failure() }}
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-latest.yml
    - name: Install dependencies with upstream BioSTEAM stack
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[ci]"
        pip install git+https://github.com/QSD-Group/QSDsan.git
        pip install --no-deps --force-reinstall git+https://github.com/BioSTEAMDevelopmentGroup/thermosteam.git@master
        pip install --no-deps --force-reinstall git+https://github.com/BioSTEAMDevelopmentGroup/biosteam.git@master
    - name: Test doc examples
      run: |
        pytest exposan --doctest-modules
    - name: Test BSM2
      run: |
        pytest tests/test_bsm2.py
    - name: Test systems
      run: |
        mkdir -p tmps
        pytest tests --ignore=tests/test_bsm2.py -n 2 --dist loadfile --basetemp=tmps/pytest-${{ github.run_id }}-${{ github.run_attempt }}
