# This workflow checks compatibility with the latest upstream BioSTEAM stack.

name: build-upstream

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: |
          pyproject.toml
          .github/requirements-release.txt
          .github/workflows/build-upstream.yml
    - name: Install dependencies with upstream BioSTEAM stack
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[ci,integration]"
        pip install --upgrade --force-reinstall git+https://github.com/BioSTEAMDevelopmentGroup/thermosteam.git@master
        pip install --upgrade --force-reinstall git+https://github.com/BioSTEAMDevelopmentGroup/biosteam.git@master
    - name: Test doc examples
      run: |
        pytest exposan --doctest-modules
    - name: Test systems
      run: |
        mkdir -p tmps
        pytest tests -n 2 --dist loadfile --basetemp=tmps/pytest-${{ github.run_id }}-${{ github.run_attempt }}
